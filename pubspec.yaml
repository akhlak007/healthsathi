name: health_sathi
description: "HealthSathi - Apnar Shastho, Apnar Hathe. A production-ready Flutter mobile app for secure clinical health records and emergency management."
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # UI & Styling (Material 3 Support and Google Fonts)
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  badges: ^3.1.2
  shimmer: ^3.0.0

  # Services & Hardware Integrations
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  local_auth: ^2.1.8
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1

  # Additional packages for OCR feature
  # Additional packages for OCR feature
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_commons: ^0.11.1
  image_cropper: ^12.2.1
  flutter_image_compress: ^2.0.3
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
#  assets:
#    - assets/images/
#    - assets/icons/
