name: health_sathi
description: "HealthSathi - Apnar Shastho, Apnar Hathe. A production-ready Flutter mobile app for secure clinical health records and emergency management."
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  cupertino_icons: ^1.0.5

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  badges: ^3.1.2
  shimmer: ^3.0.0

  # Device & System Features
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  local_auth: ^2.1.8
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.3
  uuid: ^4.5.3
  flutter_timezone: ^5.1.0
  share_plus: ^12.0.2

  # Firebase
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.6.0
  firebase_app_check: ^0.3.2+10

  # OCR & Image Processing
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_commons: ^0.11.1
  image_cropper: ^12.2.1
  flutter_image_compress: ^2.0.3

  # Network & Files
  cached_network_image: ^3.3.1
  http: ^1.6.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^31.1.19

  # Notifications & Timezone
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env

    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png